<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Scheduler V2.0 - Event Lobby</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/lobby.css">
</head>
<body class="lobby-page">
    <div class="lobby-container">
        <header class="lobby-header">
            <div class="logo">
                <h1>📅 Conference Scheduler V2.0</h1>
                <p class="version">Global Multi-Event Platform</p>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <img id="userAvatar" class="avatar" alt="User">
                <span id="userName"></span>
                <button onclick="signOut()" class="btn-secondary">로그아웃</button>
            </div>
        </header>

        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h2>🔐 로그인</h2>
                <p>Google 계정으로 로그인하여 행사를 관리하세요</p>
                <button onclick="signInWithGoogle()" class="btn-primary btn-large">
                    Google로 로그인
                </button>
            </div>
        </div>

        <div id="lobbyScreen" class="lobby-screen" style="display: none;">
            <div class="lobby-toolbar">
                <h2>내 행사 목록</h2>
                <button onclick="showCreateEventModal()" class="btn-primary">
                    ➕ 새 행사 만들기
                </button>
            </div>

            <div id="eventsContainer" class="events-grid"></div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📋</div>
                <h3>아직 생성된 행사가 없습니다</h3>
                <p>새 행사를 만들어 스케줄 관리를 시작하세요</p>
                <button onclick="showCreateEventModal()" class="btn-primary">
                    첫 행사 만들기
                </button>
            </div>
        </div>
    </div>

    <div id="createEventModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🆕 새 행사 만들기</h3>
                <button onclick="closeCreateEventModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>행사명 *</label>
                    <input type="text" id="eventName" class="form-control" 
                           placeholder="예: 2026 ASLS Spring Conference">
                </div>
                
                <div class="form-group">
                    <label>국가/지역 *</label>
                    <select id="eventCountry" class="form-control">
                        <option value="">선택하세요</option>
                        <option value="KR">🇰🇷 대한민국</option>
                        <option value="JP">🇯🇵 일본</option>
                        <option value="TH">🇹🇭 태국</option>
                        <option value="ID">🇮🇩 인도네시아</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>시간대 *</label>
                    <select id="eventTimezone" class="form-control">
                        <option value="">선택하세요</option>
                        <option value="Asia/Seoul">Asia/Seoul (KST, UTC+9)</option>
                        <option value="Asia/Tokyo">Asia/Tokyo (JST, UTC+9)</option>
                        <option value="Asia/Bangkok">Asia/Bangkok (ICT, UTC+7)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>행사 유형</label>
                    <select id="eventType" class="form-control">
                        <option value="conference">학술대회 (Conference)</option>
                        <option value="workshop">워크샵 (Workshop)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeCreateEventModal()" class="btn-secondary">취소</button>
                <button onclick="createEventHandler()" class="btn-primary">생성하기</button>
            </div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDw-hivDT9T-Iq3s3kiuTRqaumicSoWdcU",
            authDomain: "scheduler2-99724.firebaseapp.com",
            databaseURL: "https://scheduler2-99724-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "scheduler2-99724",
            storageBucket: "scheduler2-99724.firebasestorage.app",
            messagingSenderId: "1023522399376",
            appId: "1:1023522399376:web:201a526635a7058917e415"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        console.log('[Firebase] 초기화 완료');

        // Toast function
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.textContent = message;
            toast.style.cssText = 'background: white; padding: 16px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.2);';
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Auth
        let currentUser = null;

        firebase.auth().onAuthStateChanged(user => {
            currentUser = user;
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('lobbyScreen').style.display = 'block';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userName').textContent = user.displayName || user.email;
                document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/40';
                loadUserEvents();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('lobbyScreen').style.display = 'none';
                document.getElementById('userInfo').style.display = 'none';
            }
        });

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .catch(error => showToast('로그인 실패: ' + error.message, 'error'));
        }

        function signOut() {
            firebase.auth().signOut();
        }

        function showCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'flex';
        }

        function closeCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'none';
            document.getElementById('eventName').value = '';
            document.getElementById('eventCountry').value = '';
            document.getElementById('eventTimezone').value = '';
        }

        async function createEventHandler() {
            const name = document.getElementById('eventName').value.trim();
            const country = document.getElementById('eventCountry').value;
            const timezone = document.getElementById('eventTimezone').value;
            const type = document.getElementById('eventType').value;

            if (!name || !country || !timezone) {
                showToast('필수 항목을 모두 입력해주세요', 'error');
                return;
            }

            if (!currentUser) {
                showToast('로그인이 필요합니다', 'error');
                return;
            }

            try {
                const eventId = 'event_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                const eventInfo = {
                    name, country, timezone, type,
                    createdAt: Date.now(),
                    createdBy: currentUser.uid,
                    owner: currentUser.email
                };

                const updates = {};
                updates[`/events/${eventId}/info`] = eventInfo;
                updates[`/events/${eventId}/data`] = {
                    speakers: {}, lectures: {}, schedule: {},
                    sessions: [], chairs: {}, sponsors: [], roomsConfig: {}
                };
                updates[`/users/${currentUser.uid}/events/${eventId}`] = { ...eventInfo, role: 'owner' };

                await firebase.database().ref().update(updates);
                
                showToast('행사가 생성되었습니다!', 'success');
                closeCreateEventModal();
                
                setTimeout(() => {
                    window.location.href = `scheduler.html?eventId=${eventId}`;
                }, 1000);
            } catch (error) {
                console.error('행사 생성 오류:', error);
                showToast('행사 생성 중 오류가 발생했습니다', 'error');
            }
        }

        async function loadUserEvents() {
            if (!currentUser) return;
            
            const eventsRef = firebase.database().ref(`/users/${currentUser.uid}/events`);
            const snapshot = await eventsRef.once('value');
            const eventsData = snapshot.val() || {};
            
            const events = Object.entries(eventsData).map(([id, data]) => ({ id, ...data }));
            events.sort((a, b) => (b.lastAccessed || b.createdAt || 0) - (a.lastAccessed || a.createdAt || 0));
            
            renderEventsList(events);
        }

        function renderEventsList(events) {
            const container = document.getElementById('eventsContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (events.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = events.map(event => `
                <div class="event-card" onclick="goToEvent('${event.id}')">
                    <h3>${event.name}</h3>
                    <p>${event.country} · ${event.timezone}</p>
                    <small>${new Date(event.createdAt).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        async function goToEvent(eventId) {
            if (!currentUser) return;
            await firebase.database().ref(`/users/${currentUser.uid}/events/${eventId}/lastAccessed`).set(Date.now());
            window.location.href = `scheduler.html?eventId=${eventId}`;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('createEventModal');
            if (event.target === modal) closeCreateEventModal();
        };
    </script>
</body>
</html>
