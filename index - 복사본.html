<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conference Scheduler V2.0 - Event Lobby</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/lobby.css">
</head>
<body class="lobby-page">
    <div class="lobby-container">
        <header class="lobby-header">
            <div class="logo">
                <h1>📅 Conference Scheduler V2.0</h1>
                <p class="version">Global Multi-Event Platform</p>
            </div>
            <div class="user-info" id="userInfo" style="display: none;">
                <img id="userAvatar" class="avatar" alt="User">
                <span id="userName"></span>
                <button onclick="signOut()" class="btn-secondary">로그아웃</button>
            </div>
        </header>

        <!-- 로그인 화면 -->
        <div id="loginScreen" class="login-screen">
            <div class="login-box">
                <h2>🔐 로그인</h2>
                <p>Google 계정으로 로그인하여 행사를 관리하세요</p>
                <button onclick="signInWithGoogle()" class="btn-primary btn-large">
                    <img src="https://www.google.com/favicon.ico" alt="Google" style="width: 20px; margin-right: 10px;">
                    Google로 로그인
                </button>
            </div>
        </div>

        <!-- 행사 목록 화면 -->
        <div id="lobbyScreen" class="lobby-screen" style="display: none;">
            <div class="lobby-toolbar">
                <h2>내 행사 목록</h2>
                <button onclick="showCreateEventModal()" class="btn-primary">
                    ➕ 새 행사 만들기
                </button>
            </div>

            <div id="eventsContainer" class="events-grid">
                <!-- 행사 카드가 여기에 동적으로 추가됨 -->
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📋</div>
                <h3>아직 생성된 행사가 없습니다</h3>
                <p>새 행사를 만들어 스케줄 관리를 시작하세요</p>
                <button onclick="showCreateEventModal()" class="btn-primary">
                    첫 행사 만들기
                </button>
            </div>
        </div>
    </div>

    <!-- 새 행사 만들기 모달 -->
    <div id="createEventModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🆕 새 행사 만들기</h3>
                <button onclick="closeCreateEventModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>행사명 *</label>
                    <input type="text" id="eventName" class="form-control" 
                           placeholder="예: 2026 ASLS Spring Conference">
                </div>
                
                <div class="form-group">
                    <label>국가/지역 *</label>
                    <select id="eventCountry" class="form-control">
                        <option value="">선택하세요</option>
                        <option value="KR">🇰🇷 대한민국 (South Korea)</option>
                        <option value="JP">🇯🇵 일본 (Japan)</option>
                        <option value="TH">🇹🇭 태국 (Thailand)</option>
                        <option value="ID">🇮🇩 인도네시아 (Indonesia)</option>
                        <option value="VN">🇻🇳 베트남 (Vietnam)</option>
                        <option value="SG">🇸🇬 싱가포르 (Singapore)</option>
                        <option value="MY">🇲🇾 말레이시아 (Malaysia)</option>
                        <option value="PH">🇵🇭 필리핀 (Philippines)</option>
                        <option value="US">🇺🇸 미국 (United States)</option>
                        <option value="GB">🇬🇧 영국 (United Kingdom)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>시간대 (TimeZone) *</label>
                    <select id="eventTimezone" class="form-control">
                        <option value="">선택하세요</option>
                        <option value="Asia/Seoul">Asia/Seoul (KST, UTC+9)</option>
                        <option value="Asia/Tokyo">Asia/Tokyo (JST, UTC+9)</option>
                        <option value="Asia/Bangkok">Asia/Bangkok (ICT, UTC+7)</option>
                        <option value="Asia/Jakarta">Asia/Jakarta (WIB, UTC+7)</option>
                        <option value="Asia/Singapore">Asia/Singapore (SGT, UTC+8)</option>
                        <option value="Asia/Manila">Asia/Manila (PHT, UTC+8)</option>
                        <option value="America/New_York">America/New_York (EST, UTC-5)</option>
                        <option value="Europe/London">Europe/London (GMT, UTC+0)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>행사 유형</label>
                    <select id="eventType" class="form-control">
                        <option value="conference">학술대회 (Conference)</option>
                        <option value="workshop">워크샵 (Workshop)</option>
                        <option value="symposium">심포지엄 (Symposium)</option>
                        <option value="seminar">세미나 (Seminar)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>행사 설명</label>
                    <textarea id="eventDescription" class="form-control" rows="3"
                              placeholder="행사에 대한 간단한 설명 (선택사항)"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeCreateEventModal()" class="btn-secondary">취소</button>
                <button onclick="createEvent()" class="btn-primary">생성하기</button>
            </div>
        </div>
    </div>

    <!-- V1 데이터 마이그레이션 모달 -->
    <div id="migrationModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📦 V1 데이터 가져오기</h3>
                <button onclick="closeMigrationModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body">
                <p>기존 V1 스케줄러의 데이터를 이 행사로 가져옵니다.</p>
                
                <div class="alert alert-warning">
                    ⚠️ 이 작업은 현재 행사의 모든 데이터를 덮어씁니다. 
                    기존 데이터가 있다면 먼저 백업하세요.
                </div>

                <div class="form-group">
                    <label>V1 Firebase 프로젝트 ID</label>
                    <input type="text" id="v1ProjectId" class="form-control" 
                           placeholder="기존 프로젝트 ID">
                </div>

                <div class="form-group">
                    <label>V1 API Key</label>
                    <input type="password" id="v1ApiKey" class="form-control">
                </div>

                <div class="form-group">
                    <label>또는 JSON 백업 파일 업로드</label>
                    <input type="file" id="v1JsonFile" accept=".json" class="form-control">
                </div>

                <div id="migrationProgress" style="display: none;">
                    <div class="progress-bar">
                        <div id="migrationProgressBar" class="progress-fill"></div>
                    </div>
                    <p id="migrationStatus">마이그레이션 진행 중...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeMigrationModal()" class="btn-secondary">취소</button>
                <button onclick="startMigration()" class="btn-primary">가져오기 시작</button>
            </div>
        </div>
    </div>

    <!-- Toast 알림 -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- V2 Configuration -->
    <script src="config/firebase-v2.js"></script>
    <script src="config/timezones.js"></script>

    <!-- Core Scripts -->
    <script src="js/ui/toast.js"></script>
    <script src="js/features/lobby.js"></script>
    <script src="js/tools/migration.js"></script>

    <script>
        // 앱 초기화
        let currentUser = null;

        window.addEventListener('DOMContentLoaded', () => {
            initializeFirebase();
            initializeAuth();
        });

        function initializeAuth() {
            firebase.auth().onAuthStateChanged(user => {
                currentUser = user;
                
                if (user) {
                    // 로그인됨
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('lobbyScreen').style.display = 'block';
                    document.getElementById('userInfo').style.display = 'flex';
                    
                    document.getElementById('userName').textContent = user.displayName || user.email;
                    document.getElementById('userAvatar').src = user.photoURL || 'https://via.placeholder.com/40';
                    
                    // 행사 목록 로드
                    EventLobby.loadUserEvents();
                } else {
                    // 로그아웃됨
                    document.getElementById('loginScreen').style.display = 'flex';
                    document.getElementById('lobbyScreen').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'none';
                }
            });
        }

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .catch(error => {
                    showToast('로그인 실패: ' + error.message, 'error');
                });
        }

        function signOut() {
            firebase.auth().signOut();
        }

        function showCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'flex';
        }

        function closeCreateEventModal() {
            document.getElementById('createEventModal').style.display = 'none';
            // 폼 초기화
            document.getElementById('eventName').value = '';
            document.getElementById('eventCountry').value = '';
            document.getElementById('eventTimezone').value = '';
            document.getElementById('eventType').value = 'conference';
            document.getElementById('eventDescription').value = '';
        }

        async function createEvent() {
            const name = document.getElementById('eventName').value.trim();
            const country = document.getElementById('eventCountry').value;
            const timezone = document.getElementById('eventTimezone').value;
            const type = document.getElementById('eventType').value;
            const description = document.getElementById('eventDescription').value.trim();

            if (!name || !country || !timezone) {
                showToast('필수 항목을 모두 입력해주세요', 'warning');
                return;
            }

            try {
                const eventId = await EventLobby.createNewEvent({
                    name,
                    country,
                    timezone,
                    type,
                    description
                });

                showToast('행사가 생성되었습니다!', 'success');
                closeCreateEventModal();

                // 행사로 이동
                setTimeout(() => {
                    EventLobby.switchToEvent(eventId);
                }, 1000);
            } catch (error) {
                console.error('행사 생성 오류:', error);
                showToast('행사 생성 중 오류가 발생했습니다', 'error');
            }
        }

        function closeMigrationModal() {
            document.getElementById('migrationModal').style.display = 'none';
        }

        async function startMigration() {
            const projectId = document.getElementById('v1ProjectId').value.trim();
            const apiKey = document.getElementById('v1ApiKey').value.trim();
            const jsonFile = document.getElementById('v1JsonFile').files[0];

            if (!jsonFile && (!projectId || !apiKey)) {
                showToast('Firebase 정보를 입력하거나 JSON 파일을 업로드하세요', 'warning');
                return;
            }

            document.getElementById('migrationProgress').style.display = 'block';

            try {
                if (jsonFile) {
                    await MigrationTool.migrateFromJSON(jsonFile);
                } else {
                    await MigrationTool.migrateFromV1Firebase(projectId, apiKey);
                }

                showToast('마이그레이션이 완료되었습니다!', 'success');
                closeMigrationModal();
            } catch (error) {
                console.error('마이그레이션 오류:', error);
                showToast('마이그레이션 중 오류가 발생했습니다', 'error');
            }
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const createModal = document.getElementById('createEventModal');
            const migrationModal = document.getElementById('migrationModal');
            
            if (event.target === createModal) {
                closeCreateEventModal();
            }
            if (event.target === migrationModal) {
                closeMigrationModal();
            }
        };
    </script>
</body>
</html>
